<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理 - Agent Platform</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <script src="/static/js/ui-utils.js"></script>
    <script src="/static/js/common.js"></script>
    <style>
        body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s ease;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-running { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; }
        .status-finished { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .status-failed { background: linear-gradient(135deg, #e11d48, #be123c); color: white; }
        .status-pending { background: linear-gradient(135deg, #6b7280, #4b5563); color: white; }
        .status-partial_failed { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .status-cancelled { background: linear-gradient(135deg, #9ca3af, #6b7280); color: white; }

        /* Table styles */
        .project-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0;
        }
        .project-table thead th {
            background: #f8fafc;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }
        .project-table tbody td {
            padding: 10px 12px;
            font-size: 13px;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .project-table tbody tr:hover {
            background: #f0f9ff;
            transition: background 0.15s;
        }
        .project-table tbody tr:last-child td {
            border-bottom: none;
        }
        .project-table .selection-col {
            width: 64px;
        }
        .project-table .name-col {
            width: 17%;
        }
        .project-table .desc-col {
            width: 20%;
        }
        .project-table .action-col {
            width: 72px;
        }
        .project-table .count-col {
            width: 10%;
        }
        .project-table .date-col {
            width: 13%;
        }
        .project-name-cell {
            max-width: 100%;
        }
        .project-desc-cell {
            max-width: 100%;
        }
        .count-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-width: 40px;
        }
        .selection-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 20px;
        }
        .project-checkbox,
        #select-all {
            width: 14px;
            height: 14px;
            flex: 0 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 via-slate-50 to-blue-50 one-screen-layout">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        {% include "partials/sidebar.html" %}

        <!-- 主内容区 -->
        <main id="main-content" class="ml-56 p-4 flex-1 flex flex-col overflow-hidden transition-all duration-300">
            <!-- 标题栏 -->
            <div class="flex items-center justify-between mb-4 flex-shrink-0">
                <div>
                    <h1 class="text-lg font-bold text-gray-800">项目管理</h1>
                    <p class="text-xs text-gray-500 mt-0.5">管理您的自动化测试项目</p>
                </div>
                <div class="flex items-center gap-2">
                    <button id="batch-delete-btn" onclick="batchDeleteProjects()" class="hidden text-xs px-3 py-2 border border-red-200 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                        <i class="fa fa-trash mr-1"></i>批量删除 (<span id="selected-count">0</span>)
                    </button>
                    <button onclick="openCreateModal()" class="btn-primary text-white px-4 py-2 rounded-lg font-medium flex items-center shadow-md text-sm">
                        <i class="fa fa-plus mr-1.5 text-xs"></i>创建项目
                    </button>
                </div>
            </div>

            <!-- 项目列表 -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <div id="projects-container" class="flex-1 overflow-auto">
                    <table class="project-table bg-white rounded-xl shadow border border-gray-100">
                        <colgroup>
                            <col class="selection-col">
                            <col class="name-col">
                            <col class="desc-col">
                            <col class="count-col">
                            <col class="count-col">
                            <col class="count-col">
                            <col class="date-col">
                            <col class="action-col">
                        </colgroup>
                        <thead>
                            <tr>
                                <th class="text-center">
                                    <label class="selection-cell">
                                        <input type="checkbox" id="select-all" class="rounded border-gray-300" onchange="selectAllProjects(this.checked)">
                                    </label>
                                </th>
                                <th>项目名称</th>
                                <th>项目描述</th>
                                <th class="text-center">脚本数量</th>
                                <th class="text-center">任务数量</th>
                                <th class="text-center">报告数量</th>
                                <th>创建时间</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="projects-tbody">
                            <tr>
                                <td colspan="8" class="text-center text-gray-400 py-8">
                                    <i class="fa fa-spinner fa-spin text-xl mb-2"></i>
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-container flex-shrink-0 p-4 border-t border-gray-100"></div>
            </div>

            <!-- 创建/编辑项目弹窗 -->
            <div id="modal" class="modal-overlay">
                <div class="modal-content">
                    <div class="flex items-center justify-between mb-4">
                        <h2 id="modal-title" class="text-base font-bold text-gray-800">创建项目</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                            <i class="fa fa-times text-lg"></i>
                        </button>
                    </div>

                    <form id="project-form" onsubmit="submitProject(event)">
                        <input type="hidden" id="project-id">
                        <div class="mb-4">
                            <label class="block text-xs font-semibold text-gray-700 mb-1.5">项目名称</label>
                            <input type="text" id="project-name" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-xs font-semibold text-gray-700 mb-1.5">描述</label>
                            <textarea id="project-description" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" rows="3"></textarea>
                        </div>
                        <div class="flex justify-end space-x-2">
                            <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition-all text-sm">取消</button>
                            <button type="submit" class="btn-primary text-white px-4 py-2 rounded-lg font-medium text-sm">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!PageInit || !PageInit._initialized) {
                PageInit.init();
                loadProjects();
            }
        });

        var editingProjectId = null;
        var PAGE_SIZE = 10;
        var currentPage = 1;
        var totalItems = 0;
        // Cache loaded projects for name lookup in delete prompts
        var cachedProjects = [];

        function getProjectStatusText(status) {
            const map = { 'running': '运行中', 'failed': '失败', 'pending': '等待中', 'partial_failed': '部分失败', 'cancelled': '已取消' };
            return map[status] || status || '';
        }

        /** Clear all checkbox selections and hide batch delete button. */
        function clearSelection() {
            document.querySelectorAll('.project-checkbox').forEach(cb => { cb.checked = false; });
            var selectAllCb = document.getElementById('select-all');
            if (selectAllCb) selectAllCb.checked = false;
            updateBatchDeleteBtn();
        }

        /** Toggle all visible project checkboxes based on select-all state. */
        function selectAllProjects(checked) {
            document.querySelectorAll('.project-checkbox').forEach(cb => { cb.checked = checked; });
            updateBatchDeleteBtn();
        }

        /** Keep header checkbox aligned with visible row selections. */
        function updateSelectAllState() {
            var all = document.querySelectorAll('.project-checkbox');
            var checked = document.querySelectorAll('.project-checkbox:checked');
            var selectAllCb = document.getElementById('select-all');
            if (!selectAllCb) return;
            selectAllCb.checked = all.length > 0 && checked.length === all.length;
            selectAllCb.indeterminate = checked.length > 0 && checked.length < all.length;
        }

        /** Update batch delete button visibility and count. */
        function updateBatchDeleteBtn() {
            var checked = document.querySelectorAll('.project-checkbox:checked');
            var btn = document.getElementById('batch-delete-btn');
            var countSpan = document.getElementById('selected-count');
            if (checked.length > 0) {
                btn.classList.remove('hidden');
                countSpan.textContent = checked.length;
            } else {
                btn.classList.add('hidden');
                countSpan.textContent = '0';
            }
            updateSelectAllState();
        }

        /** Get project name from cached list with fallback. */
        function getProjectName(id) {
            var project = cachedProjects.find(function(p) { return p.id === id; });
            return (project && project.name) || '项目 #' + id;
        }

        async function loadProjects(page = 1) {
            currentPage = page;
            clearSelection();
            try {
                var response = await fetch('/api/projects?page=' + page + '&size=' + PAGE_SIZE);
                var data = await response.json();
                var projects = data.items || [];
                cachedProjects = projects;
                totalItems = data.total || projects.length;

                var tbody = document.getElementById('projects-tbody');

                if (projects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-400 py-8"><i class="fa fa-folder-open text-xl mb-2"></i><br>暂无项目</td></tr>';
                    updatePagination();
                    return;
                }

                var rows = projects.map(function(project) {
                    var desc = project.description || '-';
                    var scriptCount = project.script_count || 0;
                    var taskCount = project.task_total || 0;
                    var reportCount = project.report_count || 0;
                    var created = formatDateTime(project.created_at);
                    return '<tr>'
                        + '<td><div class="selection-cell"><input type="checkbox" class="project-checkbox rounded border-gray-300" value="' + project.id + '" onchange="updateBatchDeleteBtn()"></div></td>'
                        + '<td class="font-medium truncate project-name-cell" title="' + project.name + '">' + project.name + '</td>'
                        + '<td class="text-gray-500 truncate project-desc-cell" title="' + desc + '">' + desc + '</td>'
                        + '<td class="text-blue-500 truncate project-desc-cell"><span class="count-cell"><i class="fa fa-file-code-o"></i><span>' + scriptCount + '</span></span></td>'
                        + '<td class="text-purple-500 truncate project-desc-cell"><span class="count-cell"><i class="fa fa-tasks"></i><span>' + taskCount + '</span></span></td>'
                        + '<td class="text-green-500 truncate project-desc-cell"><span class="count-cell"><i class="fa fa-bar-chart"></i><span>' + reportCount + '</span></span></td>'
                        + '<td class="text-gray-400 text-xs whitespace-nowrap">' + created + '</td>'
                        + '<td class="text-center ">'
                            + '<button onclick="editProject(' + project.id + ')" class="p-1.5 rounded-lg hover:bg-blue-50 text-blue-600 transition-colors" title="编辑"><i class="fa fa-edit text-xs"></i></button>'
                            + '<button onclick="deleteProject(' + project.id + ')" class="p-1.5 rounded-lg hover:bg-red-50 text-red-600 transition-colors" title="删除"><i class="fa fa-trash text-xs"></i></button>'
                        + '</td>'
                    + '</tr>';
                }).join('');

                tbody.innerHTML = rows;
                updatePagination();
            } catch (error) {
                console.error('Failed to load projects:', error);
            }
        }

        function updatePagination() {
            var totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
            var paginationEl = document.querySelector('.pagination-container');
            if (paginationEl) {
                paginationEl.innerHTML = ''
                    + '<div class="flex items-center justify-between gap-3">'
                        + '<div class="flex items-center gap-2 text-xs text-gray-600">'
                            + '<span>共 ' + totalItems + ' 条</span>'
                            + '<span class="text-gray-400">|</span>'
                            + '<label class="flex items-center gap-1">每页'
                                + '<select id="page-size-select" class="px-2 py-1 rounded border border-gray-200 bg-white text-xs text-gray-700">'
                                    + '<option value="10"' + (PAGE_SIZE === 10 ? ' selected' : '') + '>10</option>'
                                    + '<option value="20"' + (PAGE_SIZE === 20 ? ' selected' : '') + '>20</option>'
                                    + '<option value="50"' + (PAGE_SIZE === 50 ? ' selected' : '') + '>50</option>'
                                    + '<option value="100"' + (PAGE_SIZE === 100 ? ' selected' : '') + '>100</option>'
                                + '</select>'
                                + '条'
                            + '</label>'
                        + '</div>'
                        + '<div class="flex items-center justify-center space-x-2">'
                            + '<span class="text-xs text-gray-600">第 ' + currentPage + '/' + totalPages + ' 页</span>'
                            + '<button data-page="' + (currentPage - 1) + '"'
                                    + ' class="pagination-btn px-2 py-1 rounded border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-xs"'
                                    + (currentPage <= 1 ? ' disabled' : '')
                                    + '>'
                                + '<i class="fa fa-chevron-left mr-0.5"></i>上一页'
                            + '</button>'
                            + '<button data-page="' + (currentPage + 1) + '"'
                                    + ' class="pagination-btn px-2 py-1 rounded border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-xs"'
                                    + (currentPage >= totalPages ? ' disabled' : '')
                                    + '>'
                                + '下一页<i class="fa fa-chevron-right ml-0.5"></i>'
                            + '</button>'
                        + '</div>'
                    + '</div>';

                var pageSizeSelect = document.getElementById('page-size-select');
                if (pageSizeSelect) {
                    pageSizeSelect.addEventListener('change', function() {
                        PAGE_SIZE = parseInt(pageSizeSelect.value, 10) || 10;
                        loadProjects(1);
                    });
                }

                paginationEl.querySelectorAll('.pagination-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var page = parseInt(btn.getAttribute('data-page'));
                        if (!isNaN(page) && page > 0) {
                            loadProjects(page);
                        }
                    });
                });
            }
        }

        function openCreateModal() {
            editingProjectId = null;
            document.getElementById('modal-title').textContent = '创建项目';
            document.getElementById('project-id').value = '';
            document.getElementById('project-name').value = '';
            document.getElementById('project-description').value = '';
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        async function editProject(id) {
            try {
                var response = await fetch('/api/projects/' + id);
                var project = await response.json();

                editingProjectId = id;
                document.getElementById('modal-title').textContent = '编辑项目';
                document.getElementById('project-id').value = project.id;
                document.getElementById('project-name').value = project.name;
                document.getElementById('project-description').value = project.description;
                document.getElementById('modal').classList.add('show');
            } catch (error) {
                console.error('Failed to load project:', error);
            }
        }

        async function submitProject(event) {
            event.preventDefault();

            var id = document.getElementById('project-id').value;
            var name = document.getElementById('project-name').value;
            var description = document.getElementById('project-description').value;

            try {
                if (id) {
                    await fetch('/api/projects/' + id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name, description: description })
                    });
                } else {
                    await fetch('/api/projects', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name, description: description })
                    });
                }

                closeModal();
                loadProjects();
            } catch (error) {
                console.error('Failed to save project:', error);
            }
        }

        async function deleteProject(id) {
            var projectName = getProjectName(id);
            UIUtils.confirm({
                title: '删除项目',
                message: '确定要删除项目「' + projectName + '」吗？此操作无法撤销。',
                type: 'danger',
                okText: '删除',
                onConfirm: async function() {
                    try {
                        await fetch('/api/projects/' + id, { method: 'DELETE' });
                        loadProjects();
                        UIUtils.success('删除成功', '项目「' + projectName + '」已被删除');
                    } catch (error) {
                        console.error('Failed to delete project:', error);
                        UIUtils.error('删除失败', '网络错误，请稍后重试');
                    }
                }
            });
        }

        async function batchDeleteProjects() {
            var ids = Array.from(document.querySelectorAll('.project-checkbox:checked'))
                .map(function(cb) { return parseInt(cb.value, 10); })
                .filter(function(id) { return Number.isInteger(id) && id > 0; });
            if (ids.length === 0) {
                UIUtils.warning('提示', '请先选择要删除的项目');
                return;
            }

            UIUtils.confirm({
                title: '批量删除项目',
                message: '确定要删除 ' + ids.length + ' 个项目吗？此操作无法撤销。',
                type: 'danger',
                okText: '删除',
                onConfirm: async function() {
                    try {
                        var response = await fetch('/api/projects/batch-delete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ids: ids })
                        });
                        var result = await response.json();
                        if (!response.ok) {
                            throw new Error(result.detail || '批量删除请求失败');
                        }
                        var deleted = result.deleted || 0;
                        var errors = result.errors || [];
                        if (errors.length > 0 && deleted > 0) {
                            UIUtils.warning('部分删除失败', '成功删除 ' + deleted + ' 个，' + errors.length + ' 个失败');
                        } else if (errors.length > 0 && deleted === 0) {
                            UIUtils.error('删除失败', '所有项目删除失败，请稍后重试');
                        } else {
                            UIUtils.success('删除成功', '已删除 ' + deleted + ' 个项目');
                        }
                        clearSelection();
                        var remaining = Math.max(0, totalItems - deleted);
                        var nextPage = Math.min(currentPage, Math.max(1, Math.ceil(remaining / PAGE_SIZE)));
                        loadProjects(nextPage);
                    } catch (error) {
                        console.error('Failed to batch delete projects:', error);
                        UIUtils.error('删除失败', error.message || '网络错误，请稍后重试');
                    }
                }
            });
        }
    </script>
</body>
</html>
