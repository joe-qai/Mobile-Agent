<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} - Agent Platform</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-icon { font-size: 4rem; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 via-slate-50 to-blue-50 min-h-screen flex items-center justify-center">
    <div class="text-center p-8">
        <div class="mb-4">
            {% if code == 404 %}
            <i class="fa fa-search error-icon text-gray-300"></i>
            {% elif code == 500 %}
            <i class="fa fa-cog error-icon text-gray-300"></i>
            {% else %}
            <i class="fa fa-exclamation-triangle error-icon text-gray-300"></i>
            {% endif %}
        </div>
        <h1 class="text-6xl font-bold text-gray-200 mb-2">{{ code }}</h1>
        <p class="text-lg text-gray-600 mb-6">{{ message }}</p>
        <a href="/" class="inline-block px-6 py-2.5 rounded-lg text-sm font-medium bg-blue-500 text-white hover:bg-blue-600 transition-colors">
            <i class="fa fa-home mr-1"></i> 返回首页
        </a>
    </div>
</body>
</html>
