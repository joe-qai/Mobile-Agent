<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <style>
        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}
        body {{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }}
        .report-container {{
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }}
        .report-header {{
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            color: white;
        }}
        .report-header h1 {{
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }}
        .report-header p {{
            opacity: 0.8;
            font-size: 14px;
        }}
        .report-info {{
            display: flex;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }}
        .info-item {{
            display: flex;
            align-items: center;
            gap: 8px;
        }}
        .info-item span {{
            font-size: 13px;
            opacity: 0.9;
        }}
        .status-badge {{
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }}
        .status-pass {{
            background: #d4edda;
            color: #155724;
        }}
        .status-fail {{
            background: #f8d7da;
            color: #721c24;
        }}
        .report-content {{
            padding: 30px;
        }}
        .test-summary {{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }}
        .summary-card {{
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }}
        .summary-card .value {{
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }}
        .summary-card .label {{
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }}
        .test-details {{
            border: 1px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
        }}
        .detail-header {{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }}
        .detail-header h3 {{
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }}
        .detail-body {{
            padding: 20px;
        }}
        .step-list {{
            list-style: none;
        }}
        .step-item {{
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }}
        .step-item:last-child {{
            border-bottom: none;
        }}
        .step-number {{
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }}
        .step-content {{
            flex: 1;
        }}
        .step-content h4 {{
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }}
        .step-content p {{
            font-size: 13px;
            color: #666;
        }}
        .execution-time {{
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            font-size: 13px;
            color: #888;
        }}
        .passed-icon {{
            color: #10b981;
            font-size: 20px;
        }}
    </style>
</head>
<body>
    <div class="report-container">
        <div class="report-header">
            <h1>{title}</h1>
            <p>{description}</p>
            <div class="report-info">
                <div class="info-item">
                    <span>📱 应用包名:</span>
                    <span>{package_name}</span>
                </div>
                <div class="info-item">
                    <span>🔧 测试框架:</span>
                    <span>{framework}</span>
                </div>
            </div>
        </div>
        
        <div class="report-content">
            <div class="test-summary">
                <div class="summary-card">
                    <div class="value" style="color: #667eea;">{total}</div>
                    <div class="label">测试总数</div>
                </div>
                <div class="summary-card">
                    <div class="value" style="color: #10b981;">{passed}</div>
                    <div class="label">通过</div>
                </div>
                <div class="summary-card">
                    <div class="value" style="color: #e11d48;">{failed}</div>
                    <div class="label">失败</div>
                </div>
                <div class="summary-card">
                    <div class="value" style="color: #f59e0b;">{duration}</div>
                    <div class="label">执行时间</div>
                </div>
            </div>
            
            <div class="test-details">
                <div class="detail-header">
                    <h3>测试用例详情</h3>
                    <span class="status-badge status-{status}">
                        <span class="passed-icon">✓</span> 通过
                    </span>
                </div>
                <div class="detail-body">
                    <ul class="step-list">
{steps}
                    </ul>
                    <div class="execution-time">
                        执行时间: {duration_full}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
